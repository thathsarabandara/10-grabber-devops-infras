# services-to-datastores.yaml - Restrict MySQL and Redis access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-mysql-access
  namespace: robot-platform
spec:
  podSelector:
    matchLabels:
      app: mysql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [api-gateway, auth-service, robot-service, telemetry-service, ai-service]
      ports:
        - protocol: TCP
          port: 3306
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-redis-access
  namespace: robot-platform
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [api-gateway, auth-service, robot-service, telemetry-service, ai-service]
      ports:
        - protocol: TCP
          port: 6379
