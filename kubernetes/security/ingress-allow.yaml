# ingress-allow.yaml - Allow ingress from NGINX controller to frontend/gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-nginx
  namespace: robot-platform
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [frontend, api-gateway]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080 # Frontend unprivileged port
        - protocol: TCP
          port: 8000 # API Gateway port
