# gateway-to-services.yaml - Allow API Gateway to communicate with backend microservices
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-backends
  namespace: robot-platform
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [auth-service, robot-service, telemetry-service, ai-service]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8001
        - protocol: TCP
          port: 8002
        - protocol: TCP
          port: 8003
        - protocol: TCP
          port: 8004
