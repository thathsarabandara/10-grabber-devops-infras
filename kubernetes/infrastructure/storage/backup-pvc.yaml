apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-pvc
  namespace: robot-platform
  labels:
    app.kubernetes.io/name: backup-storage
    app.kubernetes.io/part-of: grabber-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
