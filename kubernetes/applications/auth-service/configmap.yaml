apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: robot-platform
  labels:
    app: auth-service
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: grabber-platform
data:
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  DB_HOST: "mysql"
  DB_NAME: "auth_db"
  DB_USER: "auth_user"
  MAIL_FROM: ""
  MAIL_PORT: "587"
  MAIL_SERVER: ""
  MAIL_FROM_NAME: ""
  MAIL_STARTTLS: "True"
  MAIL_SSL_TLS: "False"
  USE_CREDENTIALS: "True"
  VALIDATE_CERTS: "True"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "300"
  REFRESH_TOKEN_EXPIRE_DAYS: "30"
